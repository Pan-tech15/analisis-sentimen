<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Testing - IdiomSense Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      /* Custom searchable dropdown styles */
      .search-dropdown {
        position: relative;
      }
      .search-dropdown input {
        width: 100%;
        padding: 0.5rem;
        border: 1px solid #d1d5db;
        border-radius: 0.5rem;
        outline: none;
      }
      .search-dropdown input:focus {
        ring: 2px solid #3b82f6;
      }
      .dropdown-list {
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: white;
        border: 1px solid #d1d5db;
        border-radius: 0.5rem;
        max-height: 200px;
        overflow-y: auto;
        z-index: 10;
        display: none;
      }
      .dropdown-list.show {
        display: block;
      }
      .dropdown-item {
        padding: 0.5rem;
        cursor: pointer;
        border-bottom: 1px solid #f3f4f6;
      }
      .dropdown-item:hover {
        background-color: #eff6ff;
      }
      .dropdown-item.selected {
        background-color: #3b82f6;
        color: white;
      }
    </style>
  </head>
  <body class="bg-gray-100 font-sans antialiased">
    <div class="flex h-screen overflow-hidden">
      <!-- Sidebar -->
      <aside class="w-64 bg-white shadow-lg flex-shrink-0 overflow-y-auto">
        <div class="p-4 border-b">
          <span
            class="font-bold text-2xl text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600"
            >IdiomSense</span
          >
          <p class="text-sm text-gray-500">Admin Panel</p>
        </div>
        <nav class="p-4">
          <ul class="space-y-1">
            <li>
              <a
                href="beranda-admin.html"
                class="flex items-center space-x-2 p-2 rounded-lg hover:bg-blue-50 text-gray-700"
                ><i class="fas fa-tachometer-alt w-5"></i
                ><span>Dashboard</span></a
              >
            </li>
            <li>
              <button
                id="dataCollectionBtn"
                class="w-full flex items-center justify-between p-2 rounded-lg hover:bg-gray-100 text-gray-700"
              >
                <div class="flex items-center space-x-2">
                  <i class="fas fa-database w-5"></i
                  ><span>Data Collection</span>
                </div>
                <i
                  id="dataCollectionIcon"
                  class="fas fa-chevron-down text-sm transition-transform"
                ></i>
              </button>
              <ul id="dataCollectionMenu" class="ml-6 mt-1 space-y-1 hidden">
                <li>
                  <a
                    href="dataset.html"
                    class="block p-2 rounded-lg hover:bg-gray-100 text-gray-700"
                    ><i class="fas fa-table w-5 mr-2"></i>Dataset</a
                  >
                </li>
                <li>
                  <a
                    href="kamus-idiom.html"
                    class="block p-2 rounded-lg hover:bg-gray-100 text-gray-700"
                    ><i class="fas fa-book w-5 mr-2"></i>Idiom Dictionary</a
                  >
                </li>
              </ul>
            </li>
            <li>
              <a
                href="preprocessing.html"
                class="flex items-center space-x-2 p-2 rounded-lg hover:bg-gray-100 text-gray-700"
                ><i class="fas fa-filter w-5"></i><span>Pre-Processing</span></a
              >
            </li>
            <li>
              <a
                href="processing.html"
                class="flex items-center space-x-2 p-2 rounded-lg hover:bg-gray-100 text-gray-700"
                ><i class="fas fa-brain w-5"></i><span>Processing</span></a
              >
            </li>
            <li>
              <a
                href="testing.html"
                class="flex items-center space-x-2 p-2 rounded-lg bg-blue-50 text-blue-600"
                ><i class="fas fa-vial w-5"></i><span>Testing</span></a
              >
            </li>
            <li>
              <a
                href="evaluasi.html"
                class="flex items-center space-x-2 p-2 rounded-lg hover:bg-gray-100 text-gray-700"
                ><i class="fas fa-chart-line w-5"></i><span>Evaluation</span></a
              >
            </li>
            <li class="pt-4 mt-4 border-t">
              <a
                href="login.html"
                class="flex items-center space-x-2 p-2 rounded-lg text-red-600 hover:bg-red-50"
                ><i class="fas fa-sign-out-alt w-5"></i><span>Logout</span></a
              >
            </li>
          </ul>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 overflow-y-auto p-6 bg-gray-100">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Testing</h1>

        <!-- Testing Form -->
        <div class="bg-white p-6 rounded-xl shadow-md mb-6">
          <h2 class="font-semibold text-gray-700 mb-4">Test Configuration</h2>

          <!-- Select Trained Model (with search) -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Select Trained Model</label
            >
            <div class="search-dropdown" id="modelDropdown">
              <input
                type="text"
                id="modelSearchInput"
                placeholder="Search model..."
                autocomplete="off"
              />
              <div id="modelDropdownList" class="dropdown-list"></div>
            </div>
            <input type="hidden" id="selectedModelId" value="" />
          </div>

          <!-- Select Algorithm (with search) -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Select Algorithm</label
            >
            <div class="search-dropdown" id="algoDropdown">
              <input
                type="text"
                id="algoSearchInput"
                placeholder="Search algorithm..."
                autocomplete="off"
              />
              <div id="algoDropdownList" class="dropdown-list"></div>
            </div>
            <input type="hidden" id="selectedAlgorithm" value="" />
          </div>

          <!-- Select Test Dataset -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1"
              >Select Test Dataset</label
            >
            <select
              id="datasetSelect"
              class="w-full border border-gray-300 rounded-lg p-2"
            >
              <option value="">-- Loading datasets... --</option>
            </select>
          </div>

          <!-- Start Testing Button -->
          <button
            id="startTestBtn"
            class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-6 rounded-lg transition flex items-center space-x-2"
          >
            <i class="fas fa-play"></i><span>Start Testing</span>
          </button>

          <!-- Status -->
          <div class="mt-4 p-3 bg-gray-50 rounded-lg">
            <p class="text-sm text-gray-600">
              Status :
              <span id="testStatus" class="font-medium">Not Started</span>
            </p>
            <div id="progressContainer" class="mt-2 hidden">
              <div class="w-full bg-gray-200 rounded-full h-2">
                <div
                  id="progressBar"
                  class="bg-blue-600 h-2 rounded-full"
                  style="width: 0%"
                ></div>
              </div>
              <p id="progressPercent" class="text-xs text-gray-500 mt-1">0%</p>
            </div>
          </div>
        </div>

        <!-- Test Results Table -->
        <div class="bg-white p-6 rounded-xl shadow-md">
          <h2 class="font-semibold text-gray-700 mb-4">Test Results</h2>
          <div class="overflow-x-auto">
            <table class="min-w-full border border-gray-200">
              <thead class="bg-blue-500 text-white">
                <tr>
                  <th class="px-4 py-2 border border-blue-400">Dataset Name</th>
                  <th class="px-4 py-2 border border-blue-400">Model</th>
                  <th class="px-4 py-2 border border-blue-400">Accuracy</th>
                  <th class="px-4 py-2 border border-blue-400">F1-Score</th>
                  <th class="px-4 py-2 border border-blue-400">Date</th>
                  <th class="px-4 py-2 border border-blue-400">Actions</th>
                </tr>
              </thead>
              <tbody id="testResultsBody"></tbody>
            </table>
          </div>
          <div id="testPagination" class="flex justify-center mt-4"></div>
        </div>
      </main>
    </div>

    <script>
      (function () {
        const API_BASE = "http://localhost:5000";
        let authToken = localStorage.getItem("access_token");
        let testResults = [];
        let currentPage = 1;
        const rowsPerPage = 5;
        let pollingInterval = null;
        let currentTestId = null;

        // Data for searchable dropdowns
        let modelsList = []; // { id, name, algorithm, displayText }
        let algorithmsList = [
          { value: "IndoBERT-KNN", label: "IndoBERT‑KNN" },
          { value: "Lexicon-NB", label: "Naive Bayes‑Lexicon" },
        ];

        // Helper: fetch with token
        async function apiFetch(endpoint, options = {}) {
          const headers = {
            "Content-Type": "application/json",
            Authorization: `Bearer ${authToken}`,
          };
          const response = await fetch(`${API_BASE}${endpoint}`, {
            ...options,
            headers: { ...headers, ...options.headers },
          });
          if (response.status === 401) {
            localStorage.clear();
            window.location.href = "login.html";
            return null;
          }
          return response;
        }

        // Helper: render pagination
        function renderPaginationControls(
          containerId,
          currentPage,
          totalPages,
          onPageChange,
        ) {
          const container = document.getElementById(containerId);
          if (!container) return;
          container.innerHTML = "";
          if (totalPages <= 1) return;

          const wrapper = document.createElement("div");
          wrapper.className = "flex items-center space-x-2";

          const prevBtn = document.createElement("button");
          prevBtn.innerHTML = '<i class="fas fa-chevron-left"></i> Previous';
          prevBtn.className = `px-3 py-1 rounded border ${currentPage === 1 ? "bg-gray-200 text-gray-400 cursor-not-allowed" : "bg-white hover:bg-blue-50"}`;
          prevBtn.disabled = currentPage === 1;
          prevBtn.onclick = () => {
            if (currentPage > 1) onPageChange(currentPage - 1);
          };
          wrapper.appendChild(prevBtn);

          const pageInfo = document.createElement("span");
          pageInfo.className = "text-gray-700";
          pageInfo.innerText = `Page ${currentPage} of ${totalPages}`;
          wrapper.appendChild(pageInfo);

          const pageInput = document.createElement("input");
          pageInput.type = "number";
          pageInput.min = 1;
          pageInput.max = totalPages;
          pageInput.value = currentPage;
          pageInput.className = "w-16 border rounded px-2 py-1 text-center";
          wrapper.appendChild(pageInput);

          const goBtn = document.createElement("button");
          goBtn.innerText = "Go";
          goBtn.className =
            "px-3 py-1 rounded border bg-blue-500 text-white hover:bg-blue-600";
          goBtn.onclick = () => {
            let newPage = parseInt(pageInput.value);
            if (isNaN(newPage)) newPage = 1;
            if (newPage < 1) newPage = 1;
            if (newPage > totalPages) newPage = totalPages;
            onPageChange(newPage);
          };
          wrapper.appendChild(goBtn);

          const nextBtn = document.createElement("button");
          nextBtn.innerHTML = 'Next <i class="fas fa-chevron-right"></i>';
          nextBtn.className = `px-3 py-1 rounded border ${currentPage === totalPages ? "bg-gray-200 text-gray-400 cursor-not-allowed" : "bg-white hover:bg-blue-50"}`;
          nextBtn.disabled = currentPage === totalPages;
          nextBtn.onclick = () => {
            if (currentPage < totalPages) onPageChange(currentPage + 1);
          };
          wrapper.appendChild(nextBtn);

          container.appendChild(wrapper);
        }

        // Load trained models from API (based on selected algorithm? Actually we load all, then filter by algorithm in UI)
        async function loadTrainedModels() {
          try {
            const res = await apiFetch("/api/training/history");
            if (!res) return;
            const history = await res.json();
            modelsList = history.map((item) => ({
              id: item.id,
              name: item.dataset_filename || item.name,
              algorithm: item.algorithm,
              displayText: `${item.dataset_filename || item.name} (${item.algorithm}) - Acc: ${item.metrics?.accuracy ? item.metrics.accuracy.toFixed(3) : "N/A"} - ${new Date(item.created_at).toLocaleDateString()}`,
            }));
            // Initialize model dropdown
            populateModelDropdown("");
          } catch (err) {
            console.error(err);
            modelsList = [];
            populateModelDropdown("");
          }
        }

        // Populate model dropdown list based on search text and selected algorithm
        function populateModelDropdown(searchText = "") {
          const selectedAlgo =
            document.getElementById("selectedAlgorithm").value;
          let filtered = modelsList;
          if (selectedAlgo) {
            filtered = filtered.filter((m) => m.algorithm === selectedAlgo);
          }
          if (searchText) {
            const lower = searchText.toLowerCase();
            filtered = filtered.filter((m) =>
              m.displayText.toLowerCase().includes(lower),
            );
          }
          const listDiv = document.getElementById("modelDropdownList");
          listDiv.innerHTML = "";
          if (filtered.length === 0) {
            const div = document.createElement("div");
            div.className = "dropdown-item text-gray-500";
            div.innerText = "No models found";
            listDiv.appendChild(div);
          } else {
            filtered.forEach((model) => {
              const div = document.createElement("div");
              div.className = "dropdown-item";
              div.innerText = model.displayText;
              div.dataset.id = model.id;
              div.dataset.name = model.displayText;
              div.addEventListener("click", () => {
                document.getElementById("modelSearchInput").value =
                  model.displayText;
                document.getElementById("selectedModelId").value = model.id;
                listDiv.classList.remove("show");
              });
              listDiv.appendChild(div);
            });
          }
        }

        // Populate algorithm dropdown
        function populateAlgorithmDropdown(searchText = "") {
          let filtered = algorithmsList;
          if (searchText) {
            const lower = searchText.toLowerCase();
            filtered = filtered.filter(
              (a) =>
                a.label.toLowerCase().includes(lower) ||
                a.value.toLowerCase().includes(lower),
            );
          }
          const listDiv = document.getElementById("algoDropdownList");
          listDiv.innerHTML = "";
          if (filtered.length === 0) {
            const div = document.createElement("div");
            div.className = "dropdown-item text-gray-500";
            div.innerText = "No algorithms found";
            listDiv.appendChild(div);
          } else {
            filtered.forEach((algo) => {
              const div = document.createElement("div");
              div.className = "dropdown-item";
              div.innerText = algo.label;
              div.dataset.value = algo.value;
              div.addEventListener("click", () => {
                document.getElementById("algoSearchInput").value = algo.label;
                document.getElementById("selectedAlgorithm").value = algo.value;
                listDiv.classList.remove("show");
                // Reload model dropdown based on new algorithm selection
                populateModelDropdown(
                  document.getElementById("modelSearchInput").value,
                );
              });
              listDiv.appendChild(div);
            });
          }
        }

        // Load datasets for dropdown
        async function loadDatasets() {
          try {
            const res = await apiFetch("/datasets/");
            if (!res) return;
            const datasets = await res.json();
            const select = document.getElementById("datasetSelect");
            select.innerHTML =
              '<option value="">-- Select test dataset --</option>';
            datasets.forEach((ds) => {
              const opt = document.createElement("option");
              opt.value = ds.id;
              opt.textContent = `${ds.filename} (${ds.rows} rows) - Uploaded: ${new Date(ds.uploaded_at).toLocaleDateString()}`;
              select.appendChild(opt);
            });
          } catch (err) {
            console.error(err);
            alert("Failed to load datasets.");
          }
        }

        // Load test results history
        async function loadTestResults() {
          try {
            const res = await apiFetch("/api/testing/history");
            if (!res) return;
            testResults = await res.json();
            testResults.sort(
              (a, b) => new Date(b.created_at) - new Date(a.created_at),
            );
            renderTestTable();
            renderTestPagination();
          } catch (err) {
            console.error(err);
            testResults = [];
            renderTestTable();
            renderTestPagination();
          }
        }

        function renderTestTable() {
          const start = (currentPage - 1) * rowsPerPage;
          const end = start + rowsPerPage;
          const pageData = testResults.slice(start, end);
          const tbody = document.getElementById("testResultsBody");
          tbody.innerHTML = "";
          if (pageData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-gray-500">No test results yet. </td></tr>`;
            return;
          }
          pageData.forEach((item) => {
            const row = tbody.insertRow();
            row.insertCell(0).innerHTML = item.dataset_filename || "-";
            row.insertCell(1).innerHTML = item.algorithm || "-";
            row.insertCell(2).innerHTML = item.metrics?.accuracy
              ? item.metrics.accuracy.toFixed(3)
              : "-";
            row.insertCell(3).innerHTML = item.metrics?.f1_score
              ? item.metrics.f1_score.toFixed(3)
              : "-";
            const d = item.created_at ? new Date(item.created_at) : null;
            row.insertCell(4).innerHTML = d ? d.toLocaleString() : "-";
            const act = row.insertCell(5);
            act.className = "px-4 py-2 border border-gray-200 text-center";
            act.innerHTML = `<a href="detail-testing.html?id=${item.id}" class="text-blue-500 hover:text-blue-700 mr-2"><i class="fas fa-eye"></i></a>`;
            for (let cell of row.cells)
              cell.classList.add("border", "border-gray-200", "px-4", "py-2");
          });
        }

        function renderTestPagination() {
          const totalPages = Math.ceil(testResults.length / rowsPerPage);
          renderPaginationControls(
            "testPagination",
            currentPage,
            totalPages,
            (newPage) => {
              currentPage = newPage;
              renderTestTable();
            },
          );
        }

        // Start testing
        async function startTesting() {
          const modelId = document.getElementById("selectedModelId").value;
          const algorithm = document.getElementById("selectedAlgorithm").value;
          const datasetId = document.getElementById("datasetSelect").value;
          if (!modelId) {
            alert("Please select a trained model.");
            return;
          }
          if (!algorithm) {
            alert("Please select an algorithm.");
            return;
          }
          if (!datasetId) {
            alert("Please select a test dataset.");
            return;
          }

          const startBtn = document.getElementById("startTestBtn");
          const testStatus = document.getElementById("testStatus");
          const progressContainer =
            document.getElementById("progressContainer");
          const progressBar = document.getElementById("progressBar");
          const progressPercent = document.getElementById("progressPercent");

          startBtn.disabled = true;
          testStatus.innerText = "Starting test...";
          progressContainer.classList.remove("hidden");
          progressBar.style.width = "0%";
          progressPercent.innerText = "0%";

          try {
            const res = await apiFetch("/api/testing/start", {
              method: "POST",
              body: JSON.stringify({
                model_id: parseInt(modelId),
                dataset_id: parseInt(datasetId),
                algorithm: algorithm,
              }),
            });
            if (!res) return;
            const result = await res.json();
            if (!res.ok) {
              throw new Error(result.error || "Failed to start testing");
            }
            const testId = result.test_id;
            currentTestId = testId;
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(async () => {
              const statusRes = await apiFetch(`/api/testing/status/${testId}`);
              if (!statusRes) return;
              const data = await statusRes.json();
              testStatus.innerText =
                data.status === "completed"
                  ? "Completed"
                  : data.status === "failed"
                    ? "Failed"
                    : "Running...";
              progressBar.style.width = `${data.progress}%`;
              progressPercent.innerText = `${data.progress}%`;
              if (data.status === "completed" || data.status === "failed") {
                clearInterval(pollingInterval);
                startBtn.disabled = false;
                await loadTestResults();
              }
            }, 2000);
          } catch (err) {
            alert(err.message);
            testStatus.innerText = "Failed";
            startBtn.disabled = false;
          }
        }

        // Initialize searchable dropdowns
        function initSearchableDropdowns() {
          const modelInput = document.getElementById("modelSearchInput");
          const modelList = document.getElementById("modelDropdownList");
          modelInput.addEventListener("focus", () => {
            populateModelDropdown(modelInput.value);
            modelList.classList.add("show");
          });
          modelInput.addEventListener("input", (e) => {
            populateModelDropdown(e.target.value);
            modelList.classList.add("show");
          });
          document.addEventListener("click", (e) => {
            if (
              !modelInput.contains(e.target) &&
              !modelList.contains(e.target)
            ) {
              modelList.classList.remove("show");
            }
          });

          const algoInput = document.getElementById("algoSearchInput");
          const algoList = document.getElementById("algoDropdownList");
          algoInput.addEventListener("focus", () => {
            populateAlgorithmDropdown(algoInput.value);
            algoList.classList.add("show");
          });
          algoInput.addEventListener("input", (e) => {
            populateAlgorithmDropdown(e.target.value);
            algoList.classList.add("show");
          });
          document.addEventListener("click", (e) => {
            if (!algoInput.contains(e.target) && !algoList.contains(e.target)) {
              algoList.classList.remove("show");
            }
          });
        }

        // Event listeners
        document
          .getElementById("startTestBtn")
          .addEventListener("click", startTesting);

        // Sidebar toggle
        function toggleDropdown(btn, menu, icon) {
          btn.addEventListener("click", () => {
            menu.classList.toggle("hidden");
            icon.classList.toggle("rotate-180");
          });
        }
        toggleDropdown(
          document.getElementById("dataCollectionBtn"),
          document.getElementById("dataCollectionMenu"),
          document.getElementById("dataCollectionIcon"),
        );

        // Initial load
        if (authToken) {
          loadTrainedModels();
          loadDatasets();
          loadTestResults();
          initSearchableDropdowns();
          // Pre-populate algorithm dropdown with default selection (optional)
          populateAlgorithmDropdown("");
        } else {
          window.location.href = "login.html";
        }
      })();
    </script>
  </body>
</html>
