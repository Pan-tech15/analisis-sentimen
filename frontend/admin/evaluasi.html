<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluasi Model - IdiomSense Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans antialiased">

<div class="flex h-screen overflow-hidden">
    <!-- Sidebar (konsisten) -->
    <aside class="w-64 bg-white shadow-lg flex-shrink-0 overflow-y-auto">
        <div class="p-4 border-b">
            <span class="font-bold text-2xl text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">IdiomSense</span>
            <p class="text-sm text-gray-500">Admin Panel</p>
        </div>
        <nav class="p-4">
            <ul class="space-y-1">
                <li><a href="beranda-admin.html" class="flex items-center space-x-2 p-2 rounded-lg hover:bg-blue-50 text-gray-700"><i class="fas fa-tachometer-alt w-5"></i><span>Beranda</span></a></li>
                <li>
                    <button id="dataCollectionBtn" class="w-full flex items-center justify-between p-2 rounded-lg hover:bg-gray-100 text-gray-700">
                        <div class="flex items-center space-x-2"><i class="fas fa-database w-5"></i><span>Data Collection</span></div>
                        <i id="dataCollectionIcon" class="fas fa-chevron-down text-sm transition-transform"></i>
                    </button>
                    <ul id="dataCollectionMenu" class="ml-6 mt-1 space-y-1 hidden">
                        <li><a href="dataset.html" class="block p-2 rounded-lg hover:bg-gray-100 text-gray-700"><i class="fas fa-table w-5 mr-2"></i>Dataset</a></li>
                        <li><a href="kamus-idiom.html" class="block p-2 rounded-lg hover:bg-gray-100 text-gray-700"><i class="fas fa-book w-5 mr-2"></i>Kamus Idiom</a></li>
                    </ul>
                </li>
                <li><a href="preprocessing.html" class="flex items-center space-x-2 p-2 rounded-lg hover:bg-gray-100 text-gray-700"><i class="fas fa-filter w-5"></i><span>Pre-Processing</span></a></li>
                <li>
                    <button id="processingBtn" class="w-full flex items-center justify-between p-2 rounded-lg hover:bg-gray-100 text-gray-700">
                        <div class="flex items-center space-x-2"><i class="fas fa-brain w-5"></i><span>Processing</span></div>
                        <i id="processingIcon" class="fas fa-chevron-down text-sm transition-transform"></i>
                    </button>
                    <ul id="processingMenu" class="ml-6 mt-1 space-y-1 hidden">
                        <li><a href="pengaturan.html" class="block p-2 rounded-lg hover:bg-gray-100 text-gray-700"><i class="fas fa-sliders-h w-5 mr-2"></i>Pengaturan</a></li>
                        <li><a href="latih.html" class="block p-2 rounded-lg hover:bg-gray-100 text-gray-700"><i class="fas fa-chart-line w-5 mr-2"></i>Latih</a></li>
                    </ul>
                </li>
                <li><a href="testing.html" class="flex items-center space-x-2 p-2 rounded-lg hover:bg-gray-100 text-gray-700"><i class="fas fa-vial w-5"></i><span>Testing</span></a></li>
                <li><a href="evaluasi.html" class="flex items-center space-x-2 p-2 rounded-lg bg-blue-50 text-blue-600"><i class="fas fa-chart-simple w-5"></i><span>Evaluasi</span></a></li>
                <li class="pt-4 mt-4 border-t"><a href="login.html" class="flex items-center space-x-2 p-2 rounded-lg text-red-600 hover:bg-red-50"><i class="fas fa-sign-out-alt w-5"></i><span>Logout</span></a></li>
            </ul>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-6 bg-gray-100">
        <h1 class="text-3xl font-bold text-gray-800 mb-6">Evaluasi Model</h1>

        <!-- Tabel Riwayat Hasil Latih -->
        <div class="bg-white p-6 rounded-xl shadow-md">
            <!-- Search bar dipindah ke sini, di atas judul tabel -->
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-semibold text-gray-700">Daftar Hasil Data Latih</h2>
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="Cari Model Terbaik Anda" 
                           class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg w-80 focus:ring-2 focus:ring-blue-400 focus:outline-none">
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="min-w-full border border-gray-200">
                    <thead class="bg-blue-500 text-white">
                        <tr>
                            <th class="px-4 py-2 border border-blue-400">Nama</th>
                            <th class="px-4 py-2 border border-blue-400">Model</th>
                            <th class="px-4 py-2 border border-blue-400">Akurasi</th>
                            <th class="px-4 py-2 border border-blue-400">Tanggal</th>
                            <th class="px-4 py-2 border border-blue-400">Durasi</th>
                            <th class="px-4 py-2 border border-blue-400">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="evaluationTableBody"></tbody>
                </table>
            </div>
            <div id="pagination" class="flex justify-center mt-4 space-x-2"></div>
        </div>
    </main>
</div>

<script>
    (function() {
        const API_BASE = "http://localhost:5000";
        let allTrainingData = [];
        let filteredData = [];
        let currentPage = 1;
        const rowsPerPage = 5;

        const tbody = document.getElementById('evaluationTableBody');
        const searchInput = document.getElementById('searchInput');
        const paginationDiv = document.getElementById('pagination');

        async function loadTrainingHistory() {
            try {
                const res = await fetch(`${API_BASE}/api/training/history`);
                if (!res.ok) throw new Error("Gagal memuat riwayat");
                allTrainingData = await res.json();
                allTrainingData.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                filterData();
            } catch (err) {
                console.error(err);
                alert("Gagal memuat data evaluasi.");
            }
        }

        function filterData() {
            const query = searchInput.value.trim().toLowerCase();
            if (!query) {
                filteredData = [...allTrainingData];
            } else {
                filteredData = allTrainingData.filter(item => {
                    const nama = (item.dataset_filename || '').toLowerCase();
                    const model = (item.algorithm || '').toLowerCase();
                    const akurasi = item.metrics?.accuracy != null ? item.metrics.accuracy.toFixed(3) : '-';
                    const tanggal = item.created_at ? new Date(item.created_at).toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' }).toLowerCase() : '-';
                    
                    let durasiStr = '-';
                    if (item.created_at) {
                        const start = new Date(item.created_at);
                        const end = item.completed_at ? new Date(item.completed_at) : new Date();
                        const diff = end - start;
                        if (diff >= 0) {
                            const sec = Math.floor(diff / 1000);
                            const min = Math.floor(sec / 60);
                            const hr = Math.floor(min / 60);
                            durasiStr = hr > 0 ? `${hr} jam ${min % 60} mnt` :
                                        min > 0 ? `${min} menit ${sec % 60} dtk` : `${sec} detik`;
                            if (!item.completed_at && item.status !== 'completed') durasiStr += ' (berjalan)';
                        }
                    }
                    durasiStr = durasiStr.toLowerCase();

                    return nama.includes(query) || model.includes(query) || akurasi.includes(query) || tanggal.includes(query) || durasiStr.includes(query);
                });
            }
            currentPage = 1;
            renderTable();
            renderPagination();
        }

        function renderTable() {
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageData = filteredData.slice(start, end);
            
            tbody.innerHTML = '';
            if (pageData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-gray-500">Tidak ada data yang sesuai.</td></tr>`;
                return;
            }

            pageData.forEach(item => {
                const row = tbody.insertRow();
                
                row.insertCell(0).innerHTML = item.dataset_filename || '-';
                row.insertCell(1).innerHTML = item.algorithm || '-';
                
                const acc = item.metrics?.accuracy != null ? item.metrics.accuracy.toFixed(3) : '-';
                row.insertCell(2).innerHTML = acc;
                
                const d = item.created_at ? new Date(item.created_at) : null;
                row.insertCell(3).innerHTML = d ? d.toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' }) : '-';
                
                let dur = '-';
                if (item.created_at) {
                    const start = new Date(item.created_at);
                    const end = item.completed_at ? new Date(item.completed_at) : new Date();
                    const diff = end - start;
                    if (diff >= 0) {
                        const sec = Math.floor(diff / 1000);
                        const min = Math.floor(sec / 60);
                        const hr = Math.floor(min / 60);
                        dur = hr > 0 ? `${hr} jam ${min % 60} mnt` :
                              min > 0 ? `${min} menit ${sec % 60} dtk` : `${sec} detik`;
                        if (!item.completed_at && item.status !== 'completed') dur += ' (berjalan)';
                    }
                }
                row.insertCell(4).innerHTML = dur;
                
                const actCell = row.insertCell(5);
                actCell.className = 'px-4 py-2 border border-gray-200 text-center';
                actCell.innerHTML = `
                    <a href="validasi.html?id=${item.id}" class="text-blue-500 hover:text-blue-700 mr-2" title="Lihat detail"><i class="fas fa-eye"></i></a>
                    <button class="text-green-600 hover:text-green-800 download-model" data-id="${item.id}" ${!item.model_path ? 'disabled' : ''} title="Download model"><i class="fas fa-download"></i></button>
                `;

                for (let cell of row.cells) {
                    cell.classList.add('border', 'border-gray-200', 'px-4', 'py-2');
                }
            });

            document.querySelectorAll('.download-model').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.dataset.id;
                    const training = allTrainingData.find(t => t.id == id);
                    if (training && training.model_path) {
                        window.open(`${API_BASE}/data/models/${training.model_path.split('/').pop()}`, '_blank');
                    }
                });
            });
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / rowsPerPage);
            paginationDiv.innerHTML = '';
            if (totalPages <= 1) return;

            const prevBtn = document.createElement('button');
            prevBtn.innerHTML = '<i class="fas fa-chevron-left"></i>';
            prevBtn.className = `px-3 py-1 rounded border ${currentPage === 1 ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-white hover:bg-blue-50'}`;
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderTable();
                    renderPagination();
                }
            };
            paginationDiv.appendChild(prevBtn);

            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.innerText = i;
                pageBtn.className = `px-3 py-1 rounded border ${currentPage === i ? 'bg-blue-500 text-white' : 'bg-white hover:bg-blue-50'}`;
                pageBtn.onclick = () => {
                    currentPage = i;
                    renderTable();
                    renderPagination();
                };
                paginationDiv.appendChild(pageBtn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.innerHTML = '<i class="fas fa-chevron-right"></i>';
            nextBtn.className = `px-3 py-1 rounded border ${currentPage === totalPages ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-white hover:bg-blue-50'}`;
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderTable();
                    renderPagination();
                }
            };
            paginationDiv.appendChild(nextBtn);
        }

        let debounceTimer;
        searchInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                filterData();
            }, 300);
        });

        // Sidebar toggle
        function toggleDropdown(btn, menu, icon) {
            btn.addEventListener('click', () => {
                menu.classList.toggle('hidden');
                icon.classList.toggle('rotate-180');
            });
        }
        const dataCollectionBtn = document.getElementById('dataCollectionBtn');
        const dataCollectionMenu = document.getElementById('dataCollectionMenu');
        const dataCollectionIcon = document.getElementById('dataCollectionIcon');
        toggleDropdown(dataCollectionBtn, dataCollectionMenu, dataCollectionIcon);
        
        const processingBtn = document.getElementById('processingBtn');
        const processingMenu = document.getElementById('processingMenu');
        const processingIcon = document.getElementById('processingIcon');
        toggleDropdown(processingBtn, processingMenu, processingIcon);

        loadTrainingHistory();
    })();
</script>
</body>
</html>
