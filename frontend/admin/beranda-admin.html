<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda Admin - IdiomSense</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar (sama seperti sebelumnya) -->
        <aside class="w-64 bg-white shadow-lg flex-shrink-0 overflow-y-auto">
            <div class="p-4 border-b">
                <span class="font-bold text-2xl text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">IdiomSense</span>
                <p class="text-sm text-gray-500">Admin Panel</p>
            </div>
            <nav class="p-4">
                <ul class="space-y-1">
                    <li>
                        <a href="beranda-admin.html" class="flex items-center space-x-2 p-2 rounded-lg bg-blue-50 text-blue-600">
                            <i class="fas fa-tachometer-alt w-5"></i>
                            <span>Beranda</span>
                        </a>
                    </li>
                    <li>
                        <button id="dataCollectionBtn" class="w-full flex items-center justify-between p-2 rounded-lg hover:bg-gray-100 text-gray-700">
                            <div class="flex items-center space-x-2">
                                <i class="fas fa-database w-5"></i>
                                <span>Data Collection</span>
                            </div>
                            <i id="dataCollectionIcon" class="fas fa-chevron-down text-sm transition-transform"></i>
                        </button>
                        <ul id="dataCollectionMenu" class="ml-6 mt-1 space-y-1 hidden">
                            <li><a href="dataset.html" class="block p-2 rounded-lg hover:bg-gray-100 text-gray-700"><i class="fas fa-table w-5 mr-2"></i>Dataset</a></li>
                            <li><a href="kamus-idiom.html" class="block p-2 rounded-lg hover:bg-gray-100 text-gray-700"><i class="fas fa-book w-5 mr-2"></i>Kamus Idiom</a></li>
                        </ul>
                    </li>
                    <li>
                        <a href="preprocessing.html" class="flex items-center space-x-2 p-2 rounded-lg hover:bg-gray-100 text-gray-700">
                            <i class="fas fa-filter w-5"></i>
                            <span>Pre-Processing</span>
                        </a>
                    </li>
                    <li>
                        <button id="processingBtn" class="w-full flex items-center justify-between p-2 rounded-lg hover:bg-gray-100 text-gray-700">
                            <div class="flex items-center space-x-2">
                                <i class="fas fa-brain w-5"></i>
                                <span>Processing</span>
                            </div>
                            <i id="processingIcon" class="fas fa-chevron-down text-sm transition-transform"></i>
                        </button>
                        <ul id="processingMenu" class="ml-6 mt-1 space-y-1 hidden">
                            <li><a href="pengaturan.html" class="block p-2 rounded-lg hover:bg-gray-100 text-gray-700"><i class="fas fa-sliders-h w-5 mr-2"></i>Pengaturan</a></li>
                            <li><a href="latih.html" class="block p-2 rounded-lg hover:bg-gray-100 text-gray-700"><i class="fas fa-chart-line w-5 mr-2"></i>Latih</a></li>
                        </ul>
                    </li>
                    <li>
                        <a href="testing.html" class="flex items-center space-x-2 p-2 rounded-lg hover:bg-gray-100 text-gray-700">
                            <i class="fas fa-vial w-5"></i>
                            <span>Testing</span>
                        </a>
                    </li>
                    <li class="pt-4 mt-4 border-t">
                        <a href="login.html" class="flex items-center space-x-2 p-2 rounded-lg text-red-600 hover:bg-red-50">
                            <i class="fas fa-sign-out-alt w-5"></i>
                            <span>Logout</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-6 bg-gray-100">
            <h1 class="text-3xl font-bold text-gray-800 mb-4">Dashboard</h1>

            <!-- 3 Card Statistik -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="bg-white p-4 rounded-xl shadow-md border-l-4 border-blue-500">
                    <p class="text-sm text-gray-500 uppercase">Jumlah Data</p>
                    <p class="text-2xl font-bold text-gray-800">123</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-md border-l-4 border-green-500">
                    <p class="text-sm text-gray-500 uppercase">Jumlah Idiom</p>
                    <p class="text-2xl font-bold text-gray-800">200</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-md border-l-4 border-purple-500">
                    <p class="text-sm text-gray-500 uppercase">Jumlah Training</p>
                    <p class="text-2xl font-bold text-gray-800">3</p>
                </div>
            </div>

            <!-- Dua Grafik Berdampingan -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Bar Chart: Distribusi Emosi -->
                <div class="bg-white p-4 rounded-xl shadow-md">
                    <h2 class="font-semibold text-gray-700 mb-2">Distribusi Emosi (Idiom)</h2>
                    <div class="h-64">
                        <canvas id="emotionChart"></canvas>
                    </div>
                </div>

                <!-- Pie Chart: Beridiom vs Non-Idiom -->
                <div class="bg-white p-4 rounded-xl shadow-md">
                    <h2 class="font-semibold text-gray-700 mb-2">Distribusi Kalimat</h2>
                    <div class="h-64 flex items-center justify-center">
                        <canvas id="idiomPieChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Dropdown toggle
        function toggleDropdown(btn, menu, icon) {
            btn.addEventListener('click', () => {
                menu.classList.toggle('hidden');
                icon.classList.toggle('rotate-180');
            });
        }
        const dataCollectionBtn = document.getElementById('dataCollectionBtn');
        const dataCollectionMenu = document.getElementById('dataCollectionMenu');
        const dataCollectionIcon = document.getElementById('dataCollectionIcon');
        toggleDropdown(dataCollectionBtn, dataCollectionMenu, dataCollectionIcon);

        const processingBtn = document.getElementById('processingBtn');
        const processingMenu = document.getElementById('processingMenu');
        const processingIcon = document.getElementById('processingIcon');
        toggleDropdown(processingBtn, processingMenu, processingIcon);

        // Bar Chart: Distribusi Emosi
        const ctxBar = document.getElementById('emotionChart').getContext('2d');
        new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: ['Senang', 'Percaya', 'Terkejut', 'Netral', 'Marah', 'Sedih', 'Takut'],
                datasets: [{
                    label: 'Jumlah Kalimat',
                    data: [245, 180, 120, 600, 112, 150, 95],
                    backgroundColor: ['#10b981', '#3b82f6', '#f59e0b', '#6b7280', '#ef4444', '#8b5cf6', '#ec489a']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { position: 'top', labels: { boxWidth: 10, font: { size: 11 } } }
                },
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: 'Jumlah Kalimat', font: { size: 11 } } },
                    x: { ticks: { font: { size: 11 } } }
                }
            }
        });

        // Pie Chart: Beridiom vs Non-Idiom
        const ctxPie = document.getElementById('idiomPieChart').getContext('2d');
        new Chart(ctxPie, {
            type: 'pie',
            data: {
                labels: ['Beridiom', 'Non-idiom'],
                datasets: [{
                    data: [3210, 2211],
                    backgroundColor: ['#3b82f6', '#9ca3af'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { position: 'bottom', labels: { font: { size: 12 } } },
                    tooltip: { callbacks: { label: (ctx) => `${ctx.label}: ${ctx.raw} kalimat (${((ctx.raw / (3210+2211))*100).toFixed(1)}%)` } }
                }
            }
        });
    </script>
</body>
</html>
