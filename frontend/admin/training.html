<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Model - IdiomSense Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans antialiased">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-white shadow-lg flex-shrink-0">
            <div class="p-4 border-b">
                <span class="font-bold text-2xl text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">IdiomSense</span>
                <p class="text-sm text-gray-500">Admin Panel</p>
            </div>
            <nav class="p-4">
                <ul class="space-y-2">
                    <li><a href="index.html" class="flex items-center space-x-2 p-2 rounded-lg hover:bg-blue-50 text-gray-700 hover:text-blue-600"><i class="fas fa-tachometer-alt w-5"></i><span>Dashboard</span></a></li>
                    <li><a href="dataset.html" class="flex items-center space-x-2 p-2 rounded-lg hover:bg-blue-50 text-gray-700 hover:text-blue-600"><i class="fas fa-database w-5"></i><span>Kelola Dataset</span></a></li>
                    <li><a href="preprocess.html" class="flex items-center space-x-2 p-2 rounded-lg hover:bg-blue-50 text-gray-700 hover:text-blue-600"><i class="fas fa-filter w-5"></i><span>Preprocessing</span></a></li>
                    <li><a href="training.html" class="flex items-center space-x-2 p-2 rounded-lg bg-blue-50 text-blue-600"><i class="fas fa-brain w-5"></i><span>Training Model</span></a></li>
                    <li><a href="evaluasi.html" class="flex items-center space-x-2 p-2 rounded-lg hover:bg-blue-50 text-gray-700 hover:text-blue-600"><i class="fas fa-chart-line w-5"></i><span>Evaluasi</span></a></li>
                    <li><a href="monitoring.html" class="flex items-center space-x-2 p-2 rounded-lg hover:bg-blue-50 text-gray-700 hover:text-blue-600"><i class="fas fa-shield-alt w-5"></i><span>Monitoring & Backup</span></a></li>
                    <li class="pt-4 mt-4 border-t"><a href="login.html" class="flex items-center space-x-2 p-2 rounded-lg text-red-600 hover:bg-red-50"><i class="fas fa-sign-out-alt w-5"></i><span>Logout</span></a></li>
                </ul>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-6">
            <h1 class="text-3xl font-bold text-gray-800 mb-6">Training Model Hybrid IndoBERT-KNN</h1>
            <div class="bg-white p-6 rounded-xl shadow-md">
                <h2 class="font-semibold text-gray-700 mb-4">Hyperparameter</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-600">Model Dasar</label>
                        <select class="w-full border rounded-lg p-2">
                            <option>IndoBERT + KNN (ensemble)</option>
                            <option>IndoBERT saja</option>
                            <option>KNN saja</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600">K (untuk KNN)</label>
                        <input type="number" value="5" class="w-full border rounded-lg p-2">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600">Batch size</label>
                        <input type="number" value="16" class="w-full border rounded-lg p-2">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600">Epoch</label>
                        <input type="number" value="10" class="w-full border rounded-lg p-2">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600">Learning rate</label>
                        <input type="text" value="2e-5" class="w-full border rounded-lg p-2">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600">Validation split</label>
                        <input type="text" value="0.2" class="w-full border rounded-lg p-2">
                    </div>
                </div>
                <button class="mt-6 bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-lg">Mulai Training</button>
            </div>
            <!-- Progress (akan muncul setelah training dimulai) -->
            <div class="mt-6 bg-white p-6 rounded-xl shadow-md">
                <h2 class="font-semibold text-gray-700 mb-4">Progress Training</h2>
                <div class="w-full bg-gray-200 rounded-full h-4"><div class="bg-blue-600 h-4 rounded-full" style="width:0%"></div></div>
                <p class="text-sm text-gray-500 mt-2">Epoch: 0/10, Loss: - , Accuracy: - </p>
            </div>
        </main>
    </div>
</body>
</html>
